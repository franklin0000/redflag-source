services:
  # ── RedFlag — Full Stack (Frontend + API) ─────────────────────
  - type: web
    name: redflag-app
    runtime: node
    buildCommand: npm install && npm run build && cd server && npm install && pip install -r python/requirements.txt
    startCommand: node server/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: SUMSUB_APP_TOKEN
        sync: false
      - key: SUMSUB_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://redflag-app.onrender.com
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
