services:
  # ── RedFlag — Full Stack (Frontend + API) ─────────────────────
  - type: web
    name: redflag-app
    runtime: node
    domains:
      - redflag.brave
      - www.redflag.brave
      - redflag.og
      - www.redflag.og
      - redflag.u
      - www.redflag.u
      - redflag.web3
      - www.redflag.web3
    buildCommand: npm install --include=dev && (cd server && npm install) && npm run build
    startCommand: node server/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://redflag-source.onrender.com
      - key: VITE_PROXY_WALLET_ADDRESS
        value: 0x4Bb924F138b20ED83ba2dE659A4cFBee5745CB38
      # ── Secrets (set manually in Render dashboard) ─────────────
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: SUMSUB_APP_TOKEN
        sync: false
      - key: SUMSUB_SECRET_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_API_KEY_SECRET
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: VITE_FOURSQUARE_API_KEY
        sync: false
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
